<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #87CEEB 0%, #E0F4FF 50%, #87CEEB 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .notebook {
            background: #F5E6D3;
            border-radius: 20px;
            padding: 60px 40px 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            max-width: 900px;
            width: 100%;
        }

        .notebook-rings {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            padding: 0 20px;
        }

        .ring {
            width: 30px;
            height: 50px;
            background: #F5A623;
            border-radius: 0 0 15px 15px;
            position: relative;
            top: -10px;
        }

        .header-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .replay-btn {
            width: 50px;
            height: 50px;
            background: #3498DB;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }

        .replay-btn:hover {
            transform: scale(1.1) rotate(-30deg);
        }

        .replay-btn::before {
            content: '↻';
            font-size: 30px;
            color: white;
            font-weight: bold;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 4px solid #D4A574;
            aspect-ratio: 4/3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: #F5A623;
            border-radius: 50%;
            border: 4px solid #D4A574;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .card.selected {
            border-color: #27AE60;
            box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.3);
        }

        .card.selected::after {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: #27AE60;
            border-radius: 50%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
        }

        .card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .done-btn {
            display: block;
            margin: 0 auto;
            padding: 15px 60px;
            background: #27AE60;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        .done-btn:hover {
            transform: scale(1.05);
            background: #219A52;
        }

        /* Popup Overlay */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .popup-overlay.show {
            display: flex;
        }

        .popup {
            background: white;
            border-radius: 30px;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .popup img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .popup-btn {
            padding: 15px 50px;
            background: #27AE60;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .popup-btn:hover {
            transform: scale(1.05);
        }

        .popup-btn.retry {
            background: #E74C3C;
        }

        /* Background decorations */
        .decoration {
            position: fixed;
            pointer-events: none;
            z-index: -1;
        }

        .sun {
            top: 20px;
            left: 20px;
            width: 80px;
            height: 80px;
            background: #F5A623;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(245, 166, 35, 0.5);
        }

        .cloud {
            background: white;
            border-radius: 50px;
            padding: 20px 40px;
        }

        .cloud-1 {
            top: 10px;
            right: 50px;
        }

        .cloud-2 {
            top: 60px;
            left: 100px;
        }

        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .notebook {
                padding: 50px 20px 30px;
            }

            .ring {
                width: 20px;
                height: 35px;
            }

            .notebook-rings {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Background decorations -->
    <div class="decoration sun"></div>
    <div class="decoration cloud cloud-1"></div>
    <div class="decoration cloud cloud-2"></div>

    <div class="notebook">
        <div class="notebook-rings">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
        </div>

        <div class="header-row">
            <button class="replay-btn" onclick="resetGame()"></button>
        </div>

        <div class="cards-grid">
            <div class="card" data-correct="true" onclick="toggleCard(this)">
                <img src="images/bird.png" alt="Bird">
            </div>
            <div class="card" data-correct="true" onclick="toggleCard(this)">
                <img src="images/tree.png" alt="Tree">
            </div>
            <div class="card" data-correct="true" onclick="toggleCard(this)">
                <img src="images/AC.png" alt="AC">
            </div>
            <div class="card" data-correct="false" onclick="toggleCard(this)">
                <img src="images/birds.png" alt="Birds">
            </div>
            <div class="card" data-correct="false" onclick="toggleCard(this)">
                <img src="images/car.png" alt="Car">
            </div>
            <div class="card" data-correct="true" onclick="toggleCard(this)">
                <img src="images/foot.png" alt="Walking">
            </div>
        </div>

        <button class="done-btn" onclick="checkAnswers()">تم</button>
    </div>

    <!-- Popup -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup">
            <img id="popupImage" src="" alt="Result">
            <br>
            <button class="popup-btn" id="popupBtn" onclick="closePopup()">حسناً</button>
        </div>
    </div>

    <script>
        const correctAnswers = ['bird.png', 'tree.png', 'AC.png', 'foot.png'];

        function toggleCard(card) {
            card.classList.toggle('selected');
        }

        function checkAnswers() {
            const selectedCards = document.querySelectorAll('.card.selected');
            const allCards = document.querySelectorAll('.card');
            
            let selectedImages = [];
            selectedCards.forEach(card => {
                const img = card.querySelector('img');
                const src = img.src.split('/').pop();
                selectedImages.push(src);
            });

            // Check if all correct answers are selected and no incorrect ones
            const allCorrectSelected = correctAnswers.every(answer => selectedImages.includes(answer));
            const noIncorrectSelected = selectedImages.every(img => correctAnswers.includes(img));
            const isCorrect = allCorrectSelected && noIncorrectSelected && selectedImages.length === correctAnswers.length;

            showPopup(isCorrect);
        }

        function showPopup(isCorrect) {
            const overlay = document.getElementById('popupOverlay');
            const popupImage = document.getElementById('popupImage');
            const popupBtn = document.getElementById('popupBtn');

            if (isCorrect) {
                popupImage.src = 'images/correct.png';
                popupBtn.className = 'popup-btn';
                popupBtn.textContent = 'أحسنت!';
            } else {
                popupImage.src = 'images/incorrect.png';
                popupBtn.className = 'popup-btn retry';
                popupBtn.textContent = 'حاول مرة أخرى';
            }

            overlay.classList.add('show');
        }

        function closePopup() {
            const overlay = document.getElementById('popupOverlay');
            overlay.classList.remove('show');
        }

        function resetGame() {
            const allCards = document.querySelectorAll('.card');
            allCards.forEach(card => card.classList.remove('selected'));
            closePopup();
        }
    </script>
</body>
</html>
